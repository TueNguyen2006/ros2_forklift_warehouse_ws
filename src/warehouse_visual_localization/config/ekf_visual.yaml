ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    sensor_timeout: 0.25
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    predict_to_current_time: true
    transform_time_offset: 0.0
    transform_timeout: 0.1
    reset_on_time_jump: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /rear_steer_controller/odometry
    odom0_config: [true, true, false,
                   false, false, true,
                   true, false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 20
    odom0_differential: false
    odom0_relative: false
    odom0_nodelay: true

    odom1: /visual_odom
    odom1_config: [true, true, false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 10
    odom1_differential: false
    odom1_relative: false
    odom1_nodelay: true
    odom1_pose_rejection_threshold: 3.0
    odom1_twist_rejection_threshold: 2.0
