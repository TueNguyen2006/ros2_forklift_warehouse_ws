name: visual_turnaround_default_spawn
description: >
  Starts from the default visual-localization spawn, turns through the open
  floor into the east-side aisle, then finishes inside the aisle with the
  robot facing the opposite direction.

initial_pose:
  x: -2.3
  y: -2.3
  yaw: 1.57

segments:
  - name: east_aisle_turnaround_from_default_spawn
    type: navigate_through_poses
    poses:
      - {name: "east_return_cross", x: 1.2, y: -3.8, yaw: 0.0}
      - {name: "east_south_aisle_low", x: 4.7, y: -2.2, yaw: 1.57}
      - {name: "east_south_aisle_mid_turnaround", x: 4.7, y: 1.0, yaw: -1.57}
