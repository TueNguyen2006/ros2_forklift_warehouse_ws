controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    rear_steer_controller:
      type: ackermann_steering_controller/AckermannSteeringController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    lift_position_controller:
      type: position_controllers/JointGroupPositionController

rear_steer_controller:
  ros__parameters:
    reference_timeout: 2.0
    front_steering: false
    open_loop: false
    velocity_rolling_window_size: 10
    position_feedback: false
    use_stamped_vel: true
    enable_odom_tf: false
    odom_frame_id: odom
    base_frame_id: base_link
    publish_rate: 50.0
    rear_wheels_names: [rear_right_steering_joint, rear_left_steering_joint]
    front_wheels_names: [front_right_wheel_joint, front_left_wheel_joint]
    wheelbase: 1.50
    front_wheel_track: 0.92
    rear_wheel_track: 0.78
    front_wheels_radius: 0.18
    rear_wheels_radius: 0.18

lift_position_controller:
  ros__parameters:
    joints: [fork_base_joint]
    interface_name: position
