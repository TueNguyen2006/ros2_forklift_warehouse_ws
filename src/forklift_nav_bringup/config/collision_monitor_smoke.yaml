collision_monitor:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_stability"
    cmd_vel_out_topic: "/cmd_vel"
    transform_tolerance: 0.3
    source_timeout: 0.5
    base_shift_correction: True
    stop_pub_timeout: 0.25
    polygons: ["SmokeZone"]
    SmokeZone:
      type: "polygon"
      points: [1.95, 0.82, 1.95, -0.82, -0.95, -0.82, -0.95, 0.82]
      action_type: "stop"
      max_points: 1
      visualize: False
      polygon_pub_topic: "smoke_zone"
      enabled: False
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      enabled: False
