amcl:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: scan

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_wait_cancel_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    speed_limit_topic: "/speed_limit"
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 25.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      # The bundled lattice has 16 heading bins (22.5 deg each). The goal
      # tolerance must be wider than half a bin or a geometrically completed
      # path can be rejected solely by heading quantization.
      yaw_goal_tolerance: 0.25

    # Version 2: Lattice planner with reverse-capable path following.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # Aggressive speed experiment: roughly 3-4x the original v2 cruise speed.
      desired_linear_vel: 0.375
      # The Gazebo planar model is contact-constrained and becomes intermittent
      # below roughly 0.08 m/s.  Keeping final-approach and regulated speeds
      # above that threshold prevents a valid path from stalling just outside
      # the goal tolerance while RPP is still publishing commands.
      min_approach_linear_velocity: 0.15
      lookahead_dist: 1.60
      min_lookahead_dist: 0.80
      max_lookahead_dist: 2.30
      lookahead_time: 1.60
      rotate_to_heading_angular_vel: 0.80
      transform_tolerance: 0.30
      use_velocity_scaled_lookahead_dist: True
      approach_velocity_scaling_dist: 1.80
      max_allowed_time_to_collision_up_to_carrot: 1.50
      use_collision_detection: True
      use_regulated_linear_velocity_scaling: True
      use_cost_regulated_linear_velocity_scaling: True
      cost_scaling_dist: 0.90
      cost_scaling_gain: 0.80
      inflation_cost_scaling_factor: 2.8
      regulated_linear_scaling_min_radius: 2.00
      regulated_linear_scaling_min_speed: 0.15
      use_rotate_to_heading: False
      allow_reversing: True
      max_angular_accel: 1.50
      max_robot_pose_search_dist: 10.0
      use_interpolation: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 8.0
      publish_frequency: 4.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: True
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      # Physical body is x=[-1.35, 0.25], y=[-0.55, 0.55] relative
      # to base_footprint. Keep a small planning margin on every side.
      footprint: "[[0.30, 0.60], [0.30, -0.60], [-1.40, -0.60], [-1.40, 0.60]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.8
        inflation_radius: 0.65
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        footprint_clearing_enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.5
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.0
          obstacle_min_range: 0.0
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: True
      footprint: "[[0.30, 0.60], [0.30, -0.60], [-1.40, -0.60], [-1.40, 0.60]]"
      resolution: 0.05
      track_unknown_space: false
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.8
        inflation_radius: 0.65
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerLattice"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.25
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 2000
      smooth_path: true
      minimum_turning_radius: 0.50
      reverse_penalty: 1.30
      change_penalty: 0.15
      non_straight_penalty: 1.10
      cost_penalty: 2.0
      rotation_penalty: 5.0
      retrospective_penalty: 0.015
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      max_planning_time: 2.0
      lookup_table_size: 20.0
      lattice_filepath: "/opt/ros/humble/share/nav2_smac_planner/sample_primitives/5cm_resolution/0.5m_turning_radius/ackermann/output.json"
      cache_obstacle_heuristic: true
      allow_reverse_expansion: true
      smoother:
        tolerance: 1.0e-10
        max_iterations: 1000
        w_data: 0.2
        w_smooth: 0.3
        do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: True
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 5.0
    behavior_plugins: ["wait"]
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.2
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.0
    min_rotational_vel: 0.0
    rotational_acc_lim: 0.0

waypoint_follower:
  ros__parameters:
    use_sim_time: True

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 30.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.40, 0.0, 0.75]
    min_velocity: [-0.275, 0.0, -0.75]
    max_accel: [0.475, 0.0, 0.90]
    max_decel: [-0.55, 0.0, -1.00]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.8
